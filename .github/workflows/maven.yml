

name: Java CI with Maven

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Test on (Browser ${{ matrix.browser }}, Mobile View ${{ matrix.mobileMode }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome]
        mobileMode: [true, false]
        headlessMode: [false]

    env:
      mobileViewRes: '500x900'
      desktopViewRes: '1920x1080'
      DISPLAY_NUM: $((100 + $(echo "${{ github.job }}" | cksum | cut -f1 -d' ' ) % 50))

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Download .env from Gist
        run: curl -o .env "${{ secrets.GIST_ENV_URL }}"

      - name: Export .env variables
        run: |
          while IFS='=' read -r key value; do
            [[ "$key" =~ ^#.*$ || -z "$key" ]] && continue
            value="${value%\"}"
            value="${value#\"}"
            echo "$key=$value" >> $GITHUB_ENV
          done < .env

      - name: Install tools
        if: ${{ always() && matrix.headlessMode == false }}
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg

      - name: Start virtual display
        if: ${{ always() && matrix.headlessMode == false }}
        run: |
          if [ "${{ matrix.mobileMode }}" = "true" ]; then
            RESOLUTION="${mobileViewRes}x24"
          else
            RESOLUTION="${desktopViewRes}x24"
          fi
          
          Xvfb :${DISPLAY_NUM} -screen 0 $RESOLUTION &
          echo "DISPLAY=:${DISPLAY_NUM}" >> $GITHUB_ENV

      - name: Start video recording
        if: ${{ always() && matrix.headlessMode == false }}
        run: |
          if [ "${{ matrix.mobileMode }}" = "true" ]; then
            RESOLUTION="${mobileViewRes}"
          else
            RESOLUTION="${desktopViewRes}"
          fi
          
          ffmpeg -video_size $RESOLUTION \
          -framerate 25 \
          -f x11grab \
          -i :${DISPLAY_NUM} \
          test_recording.mp4 &
          echo $! > ffmpeg.pid

      - name: Run TestNG Tests
        run: |
          mvn test -DsuiteXmlFile=suites/MainTestSuite.xml \
          -Dbrowser='${{ matrix.browser }}' -Dmobile='${{ matrix.mobileMode }}' -DheadlessMode='${{ matrix.headlessMode }}'
        working-directory: /home/runner/work/All-Chat-UI-Test-Automation/All-Chat-UI-Test-Automation
        id: run-tests

      - name: Stop recording
        if: ${{ always() && matrix.headlessMode == false }}
        run: |
          kill $(cat ffmpeg.pid)

      - name: Upload recording
        if: ${{ always() && matrix.headlessMode == false }}
        uses: actions/upload-artifact@v4
        with:
          name: Test Recording Video (Browser ${{ matrix.browser }}, Mobile View ${{ matrix.mobileMode }})
          path: test_recording.mp4

      - name: Upload Screenshots of the Failed Tests
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: Screenshots of failed tests (Browser ${{ matrix.browser }}, Mobile View ${{ matrix.mobileMode }})
          path: src/main/screenshots/**

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test Report (Browser ${{ matrix.browser }}, Mobile View ${{ matrix.mobileMode }})
          path: target/surefire-reports/**